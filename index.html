<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Copa Mundial 2026 - Calculadora de Amigos</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-app: #070a13;
            --bg-gradient: linear-gradient(180deg, #0c1122 0%, #070a13 100%);
            --bg-card: rgba(21, 27, 44, 0.85);
            --bg-input: #1e2638;
            --primary: #5856d6;
            --primary-glow: rgba(88, 86, 214, 0.35);
            --accent-gold: #e2b650;
            --text-main: #ffffff;
            --text-muted: #8e9bb6;
            --border-color: rgba(255, 255, 255, 0.06);
            --radius-lg: 20px;
            --radius-md: 12px;
            --transition: all 0.3s ease;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Plus Jakarta Sans', sans-serif; }
        body { background-color: var(--bg-app); background-image: var(--bg-gradient); color: var(--text-main); min-height: 100vh; display: flex; justify-content: center; padding: 0; overflow-x: hidden; }
        
        .app-shell { width: 100%; max-width: 500px; min-height: 100vh; display: flex; flex-direction: column; padding: 24px 16px 120px 16px; }
        .app-header { text-align: center; margin-bottom: 20px; }
        .brand-badge { background: linear-gradient(135deg, #5856d6 0%, #c644fc 100%); color: var(--text-main); padding: 6px 16px; border-radius: 30px; font-size: 0.7rem; font-weight: 800; letter-spacing: 2px; display: inline-block; margin-bottom: 10px; text-transform: uppercase; }
        .app-header h1 { font-size: 1.6rem; font-weight: 800; }

        .nav-scroller { overflow-x: auto; white-space: nowrap; display: flex; gap: 8px; padding-bottom: 10px; margin-bottom: 16px; scrollbar-width: none; }
        .nav-scroller::-webkit-scrollbar { display: none; }
        .nav-tab { background-color: var(--bg-card); color: var(--text-muted); border: 1px solid var(--border-color); padding: 10px 16px; border-radius: var(--radius-lg); font-size: 0.8rem; font-weight: 600; cursor: pointer; flex-shrink: 0; }
        .nav-tab.active { background-color: var(--primary); color: var(--text-main); box-shadow: 0 6px 15px var(--primary-glow); font-weight: 700; }

        .view-container { display: none; flex-direction: column; gap: 14px; width: 100%; }
        .view-container.active { display: flex; animation: fadeIn 0.3s ease; }

        .section-title { font-size: 1.1rem; font-weight: 700; color: var(--accent-gold); margin-top: 10px; margin-bottom: 4px; padding-left: 4px;}

        .match-card { background-color: var(--bg-card); border: 1px solid var(--border-color); border-radius: var(--radius-lg); padding: 16px; box-shadow: 0 8px 24px rgba(0, 0, 0, 0.2); }
        .match-meta { display: flex; justify-content: space-between; align-items: center; font-size: 0.7rem; color: var(--text-muted); font-weight: 700; margin-bottom: 12px; text-transform: uppercase; }
        .match-meta .location { color: var(--accent-gold); background-color: rgba(226, 182, 80, 0.08); padding: 2px 6px; border-radius: 4px; max-width: 60%; text-overflow: ellipsis; overflow: hidden; white-space: nowrap; }

        .team-row { display: flex; justify-content: space-between; align-items: center; margin: 8px 0; }
        .team-identity { display: flex; align-items: center; gap: 12px; }
        .team-flag { font-size: 1.4rem; }
        .team-name { font-size: 0.95rem; font-weight: 600; }

        .score-input { width: 48px; height: 38px; background-color: var(--bg-input); border: 1px solid rgba(255, 255, 255, 0.08); color: var(--text-main); text-align: center; font-size: 1.1rem; font-weight: 700; border-radius: var(--radius-md); }
        .score-input:focus { outline: none; border-color: var(--primary); }

        .footer-action-area { position: fixed; bottom: 0; left: 50%; transform: translateX(-50%); width: 100%; max-width: 500px; padding: 16px; background: linear-gradient(0deg, #070a13 60%, rgba(7, 10, 19, 0) 100%); z-index: 10; }
        .btn-submit { width: 100%; background: linear-gradient(135deg, #5856d6 0%, #413fad 100%); color: var(--text-main); border: none; padding: 16px; font-size: 1rem; font-weight: 700; border-radius: var(--radius-lg); cursor: pointer; box-shadow: 0 8px 20px rgba(88, 86, 214, 0.35); text-transform: uppercase; letter-spacing: 0.5px; }

        .toast-notification { position: fixed; top: -100px; left: 50%; transform: translateX(-50%); background-color: #10b981; color: white; padding: 12px 24px; border-radius: 30px; font-weight: 700; font-size: 0.85rem; transition: top 0.4s ease; z-index: 100; }
        .toast-notification.show { top: 20px; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

            <button class="nav-tab" onclick="changeStage('stage-semis', this)">Semifinales</button>
            <button class="nav-tab" onclick="changeStage('stage-final', this)">Finales</button>
        </nav>

            <section id="stage-octavos" class="view-container"></section>

        <div class="footer-action-area">
            <button class="btn-submit" onclick="persistAndCalculate()">рџ’ѕ Procesar y Cruzar Llaves</button>

    </div>

        function changeStage(stageId, element) {
            document.querySelectorAll('.view-container').forEach(view => view.classList.remove('active'));
            document.querySelectorAll('.nav-tab').forEach(tab => tab.classList.remove('active'));
            document.getElementById(stageId).classList.add('active');
            element.classList.add('active');
        }

        function renderAll() {
            const scores = JSON.parse(localStorage.getItem('wcup_2026_scores')) || {};
            const gruposContainer = document.getElementById("stage-grupos");
            gruposContainer.innerHTML = "";
            
            const letrasGrupos = ["A","B","C","D","E","F","G","H","I","J","K","L"];
            letrasGrupos.forEach(letra => {
                const header = document.createElement('div');
                header.className = "section-title";
                header.innerText = `GRUPO ${letra}`;
                gruposContainer.appendChild(header);

                groupMatches.filter(m => m.g === letra).forEach(match => {
                    gruposContainer.appendChild(createCard(match, scores));
                });
            });

            const posiciones = calculateAllGroups(scores);

            for (const stageKey in playoffBrackets) {
                const container = document.getElementById(stageKey);
                container.innerHTML = "";
                
                playoffBrackets[stageKey].forEach(match => {
                    if(match.from1 === "1A") match.t1 = posiciones["A"][0] || "1Вє Grupo A";
                    if(match.from2 === "2A") match.t2 = posiciones["A"][1] || "2Вє Grupo A";
                    if(match.from1 === "1B") match.t1 = posiciones["B"][0] || "1Вє Grupo B";
                    if(match.from2 === "2B") match.t2 = posiciones["B"][1] || "2Вє Grupo B";
                    if(match.from1 === "1C") match.t1 = posiciones["C"][0] || "1Вє Grupo C";
                    if(match.from2 === "2C") match.t2 = posiciones["C"][1] || "2Вє Grupo C";
                    if(match.from2 === "2D") match.t2 = posiciones["D"][1] || "2Вє Grupo D";
                    if(match.from1 === "1E") match.t1 = posiciones["E"][0] || "1Вє Grupo E";
                    if(match.from2 === "2E") match.t2 = posiciones["E"][1] || "2Вє Grupo E";
                    if(match.from1 === "1F") match.t1 = posiciones["F"][0] || "1Вє Grupo F";
                    if(match.from2 === "2F") match.t2 = posiciones["F"][1] || "2Вє Grupo F";
                    if(match.from1 === "1G") match.t1 = posiciones["G"][0] || "1Вє Grupo G";
                    if(match.from1 === "1H") match.t1 = posiciones["H"][0] || "1Вє Grupo H";
                    if(match.from1 === "1I") match.t1 = posiciones["I"][0] || "1Вє Grupo I";

                    if(match.from2 === "3C") match.t2 = posiciones["C"][2] || "Mejor 3Вє Grupo C";
                    if(match.from2 === "3A") match.t2 = posiciones["A"][2] || "Mejor 3Вє Grupo A";

                    if (stageKey === "stage-octavos") {
                        match.t1 = getWinnerOf(match.from1, scores, playoffBrackets["stage-r32"]) || "Ganador LL1";
                        match.t2 = getWinnerOf(match.from2, scores, playoffBrackets["stage-r32"]) || "Ganador LL2";
                    } else if (stageKey === "stage-cuartos") {
                        match.t1 = getWinnerOf(match.from1, scores, playoffBrackets["stage-octavos"]) || "Ganador Octavos A";
                        match.t2 = getWinnerOf(match.from2, scores, playoffBrackets["stage-octavos"]) || "Ganador Octavos B";
                    } else if (stageKey === "stage-semis") {
                        match.t1 = getWinnerOf(match.from1, scores, playoffBrackets["stage-cuartos"]) || "Ganador Cuartos I";
                        match.t2 = getWinnerOf(match.from2, scores, playoffBrackets["stage-cuartos"]) || "Ganador Cuartos II";
                    } else if (stageKey === "stage-final") {
                        match.t1 = getWinnerOf(match.from1, scores, playoffBrackets["stage-semis"]) || "Finalista 1";

                    container.appendChild(createCard(match, scores));

        function createCard(match, scores) {
            const s1 = scores[`${match.id}_s1`] || "";
            const s2 = scores[`${match.id}_s2`] || "";
            const card = document.createElement('div');
            card.className = "match-card";
            card.innerHTML = `
                <div class="match-meta"><span>${match.tag}</span><span class="location">${match.loc}</span></div>
                <div class="team-row">
                    <div class="team-identity"><span class="team-flag">вљЅ</span><span class="team-name">${match.t1}</span></div>
                    <input type="number" min="0" class="score-input" id="${match.id}_s1" value="${s1}">
                </div>
                <div class="team-row">
                    <div class="team-identity"><span class="team-flag">вљЅ</span><span class="team-name">${match.t2}</span></div>
                    <input type="number" min="0" class="score-input" id="${match.id}_s2" value="${s2}">
                </div>
            `;
            return card;
        }

        function calculateAllGroups(scores) {
            const letras = ["A","B","C","D","E","F","G","H","I","J","K","L"];
            let estructuraPuntos = {};
            letras.forEach(l => { estructuraPuntos[l] = {}; });

            groupMatches.forEach(m => {
                const s1 = scores[`${m.id}_s1`];
                const s2 = scores[`${m.id}_s2`];

                if(!estructuraPuntos[m.g][m.t1]) estructuraPuntos[m.g][m.t1] = { pts: 0, gd: 0 };
                if(!estructuraPuntos[m.g][m.t2]) estructuraPuntos[m.g][m.t2] = { pts: 0, gd: 0 };

                if(s1 !== undefined && s2 !== undefined && s1 !== "" && s2 !== "") {
                    const g1 = parseInt(s1);
                    const g2 = parseInt(s2);
                    estructuraPuntos[m.g][m.t1].gd += (g1 - g2);
                    estructuraPuntos[m.g][m.t2].gd += (g2 - g1);

                    if(g1 > g2) {
                        estructuraPuntos[m.g][m.t1].pts += 3;
                    } else if(g2 > g1) {
                        estructuraPuntos[m.g][m.t2].pts += 3;
                    } else {
                        estructuraPuntos[m.g][m.t1].pts += 1;
                        estructuraPuntos[m.g][m.t2].pts += 1;
                    }
                }
            });

            let posicionesFinales = {};
            letras.forEach(l => {
                posicionesFinales[l] = Object.keys(estructuraPuntos[l]).sort((a,b) => {
                    if(estructuraPuntos[l][b].pts !== estructuraPuntos[l][a].pts) {
                        return estructuraPuntos[l][b].pts - estructuraPuntos[l][a].pts;
                    }
                    return estructuraPuntos[l][b].gd - estructuraPuntos[l][a].gd;
                });
            });

            return posicionesFinales;
        }

        function getWinnerOf(matchId, scores, stage) {
            const s1 = parseInt(scores[`${matchId}_s1`]);
            const s2 = parseInt(scores[`${matchId}_s2`]);
            if(isNaN(s1) || isNaN(s2)) return null;
            
            const matchData = stage.find(m => m.id === matchId);
            if(!matchData) return null;

            if(s1 >= s2) return matchData.t1;
            return matchData.t2;
        }

        function persistAndCalculate() {
            const state = {};
            document.querySelectorAll('.score-input').forEach(input => {
                state[input.id] = input.value;
            });
            localStorage.setItem('wcup_2026_scores', JSON.stringify(state));
            
            renderAll(); 

            const toast = document.getElementById('toast');
            toast.classList.add('show');
            setTimeout(() => { toast.classList.remove('show'); }, 2500);
        }

        window.addEventListener('DOMContentLoaded', renderAll);
    </script>
</body>
